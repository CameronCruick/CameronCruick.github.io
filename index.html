<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>a question for you 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    /* subtle floating hearts background */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0.07;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.07; }
      90%  { opacity: 0.07; }
      100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
    }

    /* card */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 4rem;
      animation: fadeIn 0.8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .question-label {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 1rem;
    }

    .question-text {
      font-family: 'Caveat', cursive;
      font-size: 2.8rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 2.8rem;
      line-height: 1.2;
    }

    .buttons {
      display: flex;
      gap: 1.4rem;
      justify-content: center;
      align-items: center;
    }

    .btn {
      font-family: 'Caveat', cursive;
      font-size: 1.5rem;
      font-weight: 600;
      padding: 0.6rem 2.2rem;
      border-radius: 50px;
      border: 2.5px solid;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      outline: none;
      line-height: 1;
    }

    .btn-yes {
      background: #ff6b8a;
      border-color: #ff6b8a;
      color: #fff;
      box-shadow: 0 4px 18px rgba(255,107,138,0.28);
    }
    .btn-yes:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 24px rgba(255,107,138,0.38);
    }
    .btn-yes:active { transform: scale(0.97); }

    .btn-no {
      background: transparent;
      border-color: #ddd;
      color: #aaa;
      position: fixed; /* fixed so we can position it anywhere on screen */
      transition: none;
      /* start roughly centred — JS will override */
    }
    .btn-no:hover { border-color: #ccc; }

    /* answer screen */
    .answer {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .answer.show { display: flex; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    .answer-emoji { font-size: 4rem; }
    .answer-text {
      font-family: 'Caveat', cursive;
      font-size: 3.2rem;
      font-weight: 700;
      color: #ff6b8a;
    }
    .answer-sub {
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: #bbb;
      letter-spacing: 0.08em;
    }

    /* confetti canvas */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<canvas id="confetti"></canvas>

<div class="card" id="questionCard">
  <p class="question-label">question 1 of 1</p>
  <p class="question-text">do you love me? 🌸</p>
  <div class="buttons">
    <button class="btn btn-yes" id="yesBtn">yes</button>
  </div>
</div>

<!-- No button lives outside the card so it can roam freely -->
<button class="btn btn-no" id="noBtn">no</button>

<div class="card answer" id="answerCard">
  <div class="answer-emoji">🥰</div>
  <p class="answer-text">damn right.</p>
  <p class="answer-sub">thought so ♡</p>
</div>

<script>
  /* ── floating hearts background ── */
  const bg = document.getElementById('heartsBg');
  const emojis = ['♡','🌸','✿','❀','♥'];
  for (let i = 0; i < 22; i++) {
    const h = document.createElement('span');
    h.className = 'heart-float';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
    const dur = 9 + Math.random() * 12;
    h.style.animationDuration = dur + 's';
    h.style.animationDelay = -(Math.random() * dur) + 's';
    bg.appendChild(h);
  }

  /* ── No button — flies away ── */
  const noBtn = document.getElementById('noBtn');
  const margin = 20; // px from edges

  function placeNoBtnNear() {
    // initially place near where "no" would naturally sit
    const yesBtn = document.getElementById('yesBtn');
    const r = yesBtn.getBoundingClientRect();
    noBtn.style.left = (r.right + 22) + 'px';
    noBtn.style.top  = r.top + 'px';
  }

  function flyAway() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const bw = noBtn.offsetWidth;
    const bh = noBtn.offsetHeight;

    let nx, ny;
    // keep trying until it lands somewhere far from current pos
    const cx = parseFloat(noBtn.style.left) || W / 2;
    const cy = parseFloat(noBtn.style.top)  || H / 2;
    let attempts = 0;
    do {
      nx = margin + Math.random() * (W - bw - margin * 2);
      ny = margin + Math.random() * (H - bh - margin * 2);
      attempts++;
    } while (Math.hypot(nx - cx, ny - cy) < 200 && attempts < 30);

    noBtn.style.left = nx + 'px';
    noBtn.style.top  = ny + 'px';
  }

  window.addEventListener('load', placeNoBtnNear);
  window.addEventListener('resize', placeNoBtnNear);

  noBtn.addEventListener('click', flyAway);
  noBtn.addEventListener('touchstart', e => { e.preventDefault(); flyAway(); }, { passive: false });

  /* ── Yes button ── */
  document.getElementById('yesBtn').addEventListener('click', () => {
    document.getElementById('questionCard').style.display = 'none';
    noBtn.style.display = 'none';
    const ac = document.getElementById('answerCard');
    ac.classList.add('show');
    launchConfetti();
  });

  /* ── Confetti ── */
  function launchConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#ff6b8a','#ffb3c6','#ffd6e0','#ffec99','#b5ead7','#c7ceea'];
    const pieces = Array.from({ length: 130 }, () => ({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 200,
      r: 4 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 3,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.2,
      shape: Math.random() > 0.5 ? 'circle' : 'rect',
    }));

    let frame;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      pieces.forEach(p => {
        if (p.y > canvas.height + 20) return;
        alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
        }
        ctx.restore();
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.04;
        p.angle += p.spin;
      });
      if (alive) frame = requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
  }
</script>
</body>
</html>
